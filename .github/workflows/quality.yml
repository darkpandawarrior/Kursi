name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: ktlint · detekt · jvmTest
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Code style (ktlint)
        run: ./gradlew ktlintCheck

      # !cancelled() so all three checks always report in one run — a ktlint failure
      # doesn't hide the detekt/test results (replaces the old separate JVM Tests job).
      - name: Static analysis (detekt)
        if: ${{ !cancelled() }}
        run: ./gradlew detekt

      - name: JVM tests
        if: ${{ !cancelled() }}
        run: ./gradlew jvmTest --continue

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
