name: Deploy Server (Fly.io)

# Deploys the Ktor multiplayer server (server/Dockerfile) to Fly.io on push to main. Gated on
# FLY_API_TOKEN: no Fly app exists yet (fly.toml's `app` name is a placeholder) — the job no-ops
# until a real token secret and `fly apps create` are done.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'engine/**'
      - 'shared-protocol/**'
      - 'ai/**'
      - 'core/network/**'
      - 'fly.toml'
  workflow_dispatch:

concurrency:
  group: server-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Job-level `if:` can't reference the secrets context directly (GitHub Actions rejects it at
    # parse time: "Unrecognized named-value: 'secrets'") - gate each step instead via this env var.
    env:
      HAS_SECRET: ${{ secrets.FLY_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        if: env.HAS_SECRET == 'true'

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        if: env.HAS_SECRET == 'true'

      - name: Deploy
        if: env.HAS_SECRET == 'true'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
