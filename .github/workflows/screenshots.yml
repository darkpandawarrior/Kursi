name: Screenshots

# Self-maintaining render-harness baselines.
#
# The Kursi render harness (`:cmp-desktop:renderScreens`) runs the Compose desktop JVM
# target headlessly and writes PNGs to cmp-desktop/build/shots/. CI runs on Linux (deterministic
# renderer) and copies the output to docs/screenshots/, then commits any changed/new shots
# back to main — so baselines are always in sync with code and never drift from CI's environment.
#
# On PRs: shots are uploaded as an artifact for review, not committed.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # manual "refresh all baselines now"

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  render:
    name: Render & commit baselines
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Render all screen fixtures to cmp-desktop/build/shots/
      - name: Render screenshots
        run: ./gradlew :cmp-desktop:renderScreens

      # Copy to docs/screenshots/ for committed baselines
      - name: Copy to docs/screenshots
        run: |
          mkdir -p docs/screenshots
          cp -r cmp-desktop/build/shots/. docs/screenshots/

      # Push: commit new/changed shots back to main.
      # [skip ci] prevents this push from re-triggering the workflow.
      - name: Commit refreshed baselines
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots
          if git diff --cached --quiet; then
            echo "Screenshots unchanged — nothing to commit."
          else
            git commit -m "chore(screenshots): refresh baselines [skip ci]"
            git push
          fi

      # PR: upload for human review
      - name: Upload screenshots (PR review)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: kursi-screenshots
          path: docs/screenshots/
