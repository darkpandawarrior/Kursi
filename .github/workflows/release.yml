name: Release

# Manual release orchestration. Trigger from GitHub Actions → Run workflow.
# All credential inputs are placeholders until you add the corresponding
# repository secrets (see scripts/setup-secrets.md or keystore.properties.template).
#
# Rungs:
#   android_rung — skip | internal | beta | production
#   ios_rung     — skip | testflight | appstore
on:
  workflow_dispatch:
    inputs:
      android_rung:
        description: "Android release rung"
        type: choice
        options: [skip, internal, beta, production]
        default: internal
      ios_rung:
        description: "iOS release rung"
        type: choice
        options: [skip, testflight, appstore]
        default: skip
      version_bump:
        description: "Bump MILESTONE via a PR before building (merge it, then re-run to build the new version — MARKETING/FINGERPRINT are computed live from MILESTONE + commit count, not baked into a same-run commit)"
        type: choice
        options: [none, milestone]
        default: none

permissions:
  contents: write

jobs:
  # ── Version bump (optional) ────────────────────────────────────────────────
  # Opens a PR instead of pushing straight to main, so a future branch-protection required-check
  # ruleset doesn't block this workflow. The android/ios jobs below build off main as it is right
  # now — merge the PR and re-run the workflow to actually build the bumped milestone.
  bump:
    name: Bump Milestone (opens PR)
    runs-on: ubuntu-latest
    if: ${{ inputs.version_bump != 'none' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Bump MILESTONE
        run: bash scripts/bump_version.sh --milestone
      - name: Open version-bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          new_milestone="$(tr -d '[:space:]' < MILESTONE)"
          branch="chore/bump-milestone-${new_milestone}-$(date -u +%Y%m%d%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add MILESTONE
          git commit -m "chore: bump milestone to ${new_milestone}"
          git push -u origin "$branch"
          gh pr create --title "chore: bump milestone to ${new_milestone}" \
            --base main --head "$branch" \
            --body "Opened by the Release workflow (version_bump=${{ inputs.version_bump }}). Merge before the next run so android/ios builds pick up the bumped MILESTONE."

  # ── Android release APK / AAB ─────────────────────────────────────────────
  android:
    name: Android (${{ inputs.android_rung }})
    runs-on: ubuntu-latest
    needs: [bump]
    if: |
      always() &&
      inputs.android_rung != 'skip' &&
      (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    environment: >-
      ${{ inputs.android_rung == 'production' && 'play-production'
       || (inputs.android_rung == 'beta' && 'play-beta' || 'play-internal') }}
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: main  # pick up the version-bump commit

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Materialize signing secrets from base64-encoded repo secrets. Canonical names (see
      # docs/RELEASE.md) — used consistently across every Android deploy workflow in this repo:
      #   ANDROID_KEYSTORE_B64        — base64 of kursi-release.keystore
      #   ANDROID_KEYSTORE_PASSWORD   — store password
      #   ANDROID_KEY_ALIAS           — key alias (kursi)
      #   ANDROID_KEY_PASSWORD        — key password
      #   PLAYSTORE_CREDS_B64         — base64 of play-service-account.json
      - name: Materialize signing secrets
        run: |
          set -euo pipefail
          mkdir -p secrets
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > secrets/kursi-release.keystore
            {
              echo "RELEASE_STORE_FILE=$PWD/secrets/kursi-release.keystore"
              echo "RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD:-}"
              echo "RELEASE_KEY_ALIAS=${KEY_ALIAS:-kursi}"
              echo "RELEASE_KEY_PASSWORD=${KEY_PASSWORD:-}"
            } >> "$GITHUB_ENV"
          fi
          if [ -n "${PLAYSTORE_CREDS_B64:-}" ]; then
            echo "$PLAYSTORE_CREDS_B64" | base64 -d > secrets/play-service-account.json
            echo "PLAY_STORE_KEY_FILE_PATH=$PWD/secrets/play-service-account.json" >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_B64:      ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAYSTORE_CREDS_B64: ${{ secrets.PLAYSTORE_CREDS_B64 }}

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build release AAB + APK (Gms — the full-feature build that ships to Play/Indus)
        run: |
          ./gradlew :cmp-android:bundleGmsRelease :cmp-android:assembleGmsRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kursi-release-apk
          path: cmp-android/build/outputs/apk/gms/release/*.apk

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kursi-release-aab
          path: cmp-android/build/outputs/bundle/gmsRelease/

      - name: Deploy to Play Store (${{ inputs.android_rung }})
        if: env.PLAY_STORE_KEY_FILE_PATH != ''
        run: |
          case "${{ inputs.android_rung }}" in
            internal)    bundle exec fastlane android internal ;;
            beta)        bundle exec fastlane android beta ;;
            production)  bundle exec fastlane android production \
                           rollout:${{ inputs.production_rollout || '0.10' }} ;;
          esac

  # ── iOS TestFlight / App Store ────────────────────────────────────────────
  ios:
    name: iOS (${{ inputs.ios_rung }})
    runs-on: macos-latest
    needs: [bump]
    if: |
      always() &&
      inputs.ios_rung != 'skip' &&
      (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build KMP iOS framework
        run: ./gradlew :cmp-ios:linkReleaseFrameworkIosArm64

      - name: Deploy to TestFlight / App Store
        run: |
          case "${{ inputs.ios_rung }}" in
            testflight) bundle exec fastlane ios testflight ;;
            appstore)   bundle exec fastlane ios appstore ;;
          esac
        env:
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
