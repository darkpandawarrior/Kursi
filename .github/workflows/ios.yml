name: iOS

# iOS compile check runs on the macOS runner (~10× the cost of ubuntu) and links the
# ~1 GB Kotlin/Native toolchain. To keep PR CI cheap it runs:
#   • on every push to main (always — full safety net), and
#   • on PRs ONLY when iOS-relevant code changes (the shared KMP modules the iOS targets
#     compile, plus build config). Docs-only, web-only, desktop-only, android-only, and
#     server-only PRs skip the macOS leg entirely.
# The path list is deliberately conservative: any change to shared code still triggers it.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'engine/**'
      - 'ai/**'
      - 'cmp-shared/**'
      - 'cmp-ios/**'
      - 'iosApp/**'
      - 'core/**'
      - 'feature/**'
      - 'shared-protocol/**'
      - 'gradle/**'
      - 'gradle.properties'
      - '**/*.gradle.kts'
      - '.github/workflows/ios.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-compile:
    name: iOS Compile Check
    runs-on: macos-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # Kotlin/Native toolchain (~1 GB) — cache keyed on version catalog
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-
            ${{ runner.os }}-konan-

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Compile the shared KMP modules for both iOS targets without linking:
      # linking pulls Apple private frameworks that may not be on the runner SDK.
      - name: Compile KMP for iOS
        run: |
          ./gradlew \
            :engine:compileKotlinIosArm64 \
            :engine:compileKotlinIosSimulatorArm64 \
            :ai:compileKotlinIosSimulatorArm64 \
            :cmp-shared:compileKotlinIosSimulatorArm64
