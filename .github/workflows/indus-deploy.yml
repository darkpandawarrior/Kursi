name: Deploy to Indus Appstore

# Publishes the release AAB to Indus Appstore via PhonePe's Indus-Flows action, matching the
# pattern used by PaymentsLab/Mileway. Gated on INDUS_API_KEY: this repo's signing secrets are
# placeholders until configured (see keystore.properties.template), so this job no-ops until set.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy AAB
    runs-on: ubuntu-latest
    env:
      HAS_SECRET: ${{ secrets.INDUS_API_KEY != '' }}
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        if: env.HAS_SECRET == 'true'

      - name: Set up JDK 17
        if: env.HAS_SECRET == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        if: env.HAS_SECRET == 'true'
        uses: gradle/actions/setup-gradle@v4

      - run: chmod +x ./gradlew
        if: env.HAS_SECRET == 'true'

      # Materialize signing secrets from base64 repo secrets (placeholders until configured).
      - name: Materialize signing secrets
        if: env.HAS_SECRET == 'true'
        run: |
          set -euo pipefail
          mkdir -p secrets
          if [ -n "${KEYSTORE_B64:-}" ]; then
            echo "$KEYSTORE_B64" | base64 -d > secrets/kursi-release.keystore
            {
              echo "RELEASE_STORE_FILE=$PWD/secrets/kursi-release.keystore"
              echo "RELEASE_STORE_PASSWORD=${KEYSTORE_PASSWORD:-}"
              echo "RELEASE_KEY_ALIAS=${KEY_ALIAS:-kursi}"
              echo "RELEASE_KEY_PASSWORD=${KEY_PASSWORD:-}"
            } >> "$GITHUB_ENV"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build release AAB (Gms — the full-feature build; noGms is F-Droid-only)
        if: env.HAS_SECRET == 'true'
        run: ./gradlew :cmp-android:bundleGmsRelease

      - name: Deploy to Indus Appstore
        if: env.HAS_SECRET == 'true'
        uses: PhonePe/Indus-Flows@v1
        with:
          app_bundle_path: 'cmp-android/build/outputs/bundle/gmsRelease/cmp-android-gms-release.aab'
          api_key: ${{ secrets.INDUS_API_KEY }}
          app_id: ${{ secrets.INDUS_APP_ID }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
