name: Web

on:
  push:
    branches: [main]
    paths:
      - 'cmp-web/**'
      - 'cmp-shared/**'
      - 'core/**'
      - 'feature/**'
      - 'engine/**'
      - 'ai/**'
      - 'gradle/**'
      - 'gradle.properties'
      - '*.kts'
  pull_request:
    branches: [main]
    paths:
      - 'cmp-web/**'
      - 'cmp-shared/**'
      - 'core/**'
      - 'feature/**'
      - 'engine/**'
      - 'ai/**'

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Wasm browser distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build
        run: ./gradlew :cmp-web:wasmJsBrowserDistribution

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kursi-web-${{ github.sha }}
          path: cmp-web/build/dist/wasmJs/productionExecutable/
          retention-days: 7

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Build
        run: ./gradlew :cmp-web:wasmJsBrowserDistribution

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: cmp-web/build/dist/wasmJs/productionExecutable/

      - id: deployment
        uses: actions/deploy-pages@v4
