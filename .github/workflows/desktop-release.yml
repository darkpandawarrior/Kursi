name: Desktop Release

# Builds native Compose Desktop distributions (Dmg/Msi/Deb) across a per-OS runner matrix — each
# native installer format can only be built on its own OS — and publishes them to the GitHub
# Release. Icons under cmp-desktop/src/jvmMain/resources/icons are optional (see build.gradle.kts);
# packaging still succeeds without them.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish artifacts to (defaults to the triggering release)"
        required: false

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageDmg
            glob: "cmp-desktop/build/compose/binaries/main/dmg/*.dmg"
          - os: windows-latest
            task: packageMsi
            glob: "cmp-desktop/build/compose/binaries/main/msi/*.msi"
          - os: ubuntu-latest
            task: packageDeb
            glob: "cmp-desktop/build/compose/binaries/main/deb/*.deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission (Unix)
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build ${{ matrix.task }}
        shell: bash
        run: ./gradlew :cmp-desktop:${{ matrix.task }}

      - name: Publish to GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          gh release upload "$TAG" ${{ matrix.glob }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
