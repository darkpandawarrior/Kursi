name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# JVM tests live in quality.yml (ktlint · detekt · jvmTest). Desktop compile is covered
# by screenshots.yml (renderScreens compiles :cmp-desktop before rendering). iOS compile
# moved to ios.yml (path-filtered — macOS runner only runs when iOS-relevant code changes).
# This workflow is now just the Android assemble smoke-check.
jobs:
  # ── Android debug build ────────────────────────────────────────────────────
  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Assemble debug APK (Gms — the full-feature build that ships to Play/Indus)
        run: ./gradlew :cmp-android:assembleGmsDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kursi-debug-apk
          path: cmp-android/build/outputs/apk/gms/debug/*.apk
