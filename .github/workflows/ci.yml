name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JVM tests (fast gate — no emulator, no native toolchain) ──────────────
  test:
    name: JVM Tests
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Engine, AI, core:prefs, feature:game all have jvmTest suites
      - name: Run JVM tests
        run: ./gradlew jvmTest --continue

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-results
          path: '**/build/reports/tests/'

  # ── Android debug build ────────────────────────────────────────────────────
  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :cmp-android:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kursi-debug-apk
          path: cmp-android/build/outputs/apk/debug/kursi-debug-*.apk

  # ── iOS compile check (KMP source compatibility) ──────────────────────────
  ios-compile:
    name: iOS Compile Check
    runs-on: macos-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      # Kotlin/Native toolchain (~1 GB) — cache keyed on version catalog
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-v1-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-v1-
            ${{ runner.os }}-konan-

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # Compile the shared KMP modules for both iOS targets without linking:
      # linking pulls Apple private frameworks that may not be on the runner SDK.
      - name: Compile KMP for iOS
        run: |
          ./gradlew \
            :engine:compileKotlinIosArm64 \
            :engine:compileKotlinIosSimulatorArm64 \
            :ai:compileKotlinIosSimulatorArm64 \
            :cmp-shared:compileKotlinIosSimulatorArm64

  # ── Desktop compile ───────────────────────────────────────────────────────
  desktop:
    name: Desktop Compile
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Compile desktop JVM target
        run: ./gradlew :cmp-desktop:compileKotlinJvm
